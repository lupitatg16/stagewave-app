<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calidad de Software — ITESO 2026</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f13;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e0e0e0;
    }
    .card {
      text-align: center;
      padding: 3rem 2.5rem;
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 16px;
      max-width: 420px;
      width: 90%;
    }
    .icon { font-size: 3rem; margin-bottom: 1.25rem; }
    h1 { font-size: 1.4rem; color: #fff; margin-bottom: .75rem; }
    p  { font-size: .95rem; color: #888; line-height: 1.6; }
    .footer {
      margin-top: 2rem;
      font-size: .8rem;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">&#128274;</div>
    <h1>Acceso no disponible</h1>
    <p>Esta aplicación estará disponible en la fecha indicada por tu profesor/a.<br>
       Por favor espera las instrucciones del curso.</p>
    <div class="footer">Calidad de Software &bull; G. Torres &bull; ITESO &bull; 2026</div>
  </div>
</body>
</html>
